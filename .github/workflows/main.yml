name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.10, 3.11, 3.12]

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Install uv
      - name: Install uv
        run: pip install uv

      # 4. Sync dependencies (uv.lock)
      - name: uv sync
        run: uv sync

      # 5. Build the package (C++ extension)
      - name: Build extension
        run: uv run python -m pip install .

      # 6. Verify the module loads correctly
      - name: Smoke test import
        run: uv run python -c "from fast_module import fast_add; print(fast_add(2, 3))"

      # 7. Run unit & integration tests
      - name: Run pytest
        run: uv run pytest tests/ --maxfail=1 --disable-warnings -v

      # 8. Optional: List build artifacts
      - name: Verify build artifacts
        run: ls -lh src/fast_module/
